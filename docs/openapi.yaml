openapi: 3.0.3
info:
  title: Gophermart API
  version: 1.0.0
  description: Loyalty system API for Gophermart.

servers:
  - url: http://localhost:8888

tags:
  - name: auth
  - name: orders
  - name: balance

paths:
  /api/user/register:
    post:
      tags: [auth]
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: User registered and authenticated
          headers:
            Authorization:
              schema:
                type: string
                example: Bearer <jwt>
        '400':
          description: Invalid request format
        '409':
          description: Login already exists
        '500':
          description: Internal server error

  /api/user/login:
    post:
      tags: [auth]
      summary: Authenticate user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: User authenticated
          headers:
            Authorization:
              schema:
                type: string
                example: Bearer <jwt>
        '400':
          description: Invalid request format
        '401':
          description: Invalid credentials
        '500':
          description: Internal server error

  /api/user/orders:
    post:
      tags: [orders]
      summary: Upload order number
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              example: "2377225624"
      responses:
        '200':
          description: Order already uploaded by this user
        '202':
          description: New order accepted
        '400':
          description: Invalid request format
        '401':
          description: Unauthorized
        '409':
          description: Order already uploaded by another user
        '422':
          description: Invalid order number (Luhn)
        '500':
          description: Internal server error

    get:
      tags: [orders]
      summary: List user orders
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Orders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
        '204':
          description: No orders
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

  /api/user/balance:
    get:
      tags: [balance]
      summary: Get current user balance
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Balance info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Balance'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

  /api/user/balance/withdraw:
    post:
      tags: [balance]
      summary: Withdraw loyalty points
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WithdrawRequest'
      responses:
        '200':
          description: Withdrawal accepted
        '400':
          description: Invalid request format
        '401':
          description: Unauthorized
        '402':
          description: Insufficient funds
        '422':
          description: Invalid order number (Luhn)
        '500':
          description: Internal server error

  /api/user/withdrawals:
    get:
      tags: [balance]
      summary: List user withdrawals
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Withdrawals list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Withdrawal'
        '204':
          description: No withdrawals
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AuthRequest:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
          example: alice
        password:
          type: string
          example: secret

    Order:
      type: object
      properties:
        number:
          type: string
          example: "2377225624"
        status:
          type: string
          enum: [NEW, PROCESSING, INVALID, PROCESSED]
          example: NEW
        accrual:
          type: number
          format: float
          nullable: true
          example: 500
        uploaded_at:
          type: string
          format: date-time
          example: "2026-05-10T12:00:00Z"

    Balance:
      type: object
      required: [current, withdrawn]
      properties:
        current:
          type: number
          format: float
          example: 500.5
        withdrawn:
          type: number
          format: float
          example: 42

    WithdrawRequest:
      type: object
      required: [order, sum]
      properties:
        order:
          type: string
          example: "2377225624"
        sum:
          type: number
          format: float
          example: 10

    Withdrawal:
      type: object
      required: [order, sum, processed_at]
      properties:
        order:
          type: string
          example: "2377225624"
        sum:
          type: number
          format: float
          example: 500
        processed_at:
          type: string
          format: date-time
          example: "2026-05-10T12:00:00Z"
