services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gophermart
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d gophermart"]
      interval: 5s
      timeout: 5s
      retries: 10

  accrual:
    image: debian:bookworm-slim
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./cmd/accrual/accrual_linux_amd64:/usr/local/bin/accrual:ro
    entrypoint: ["/usr/local/bin/accrual"]
    command: ["-a", ":8081", "-d", "postgres://user:password@db:5432/gophermart?sslmode=disable"]
    ports:
      - "8081:8081"

volumes:
  db_data:
